<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Monitor de Sistemas Resende-Tech</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Monitor de Sistemas Resende-Tech</h1>
    </header>

    <main>

        <section class="card">
            <h2>Servidor Web</h2>
            <p>Status: Online</p>
        </section>

        <section class="card">
            <h2>Banco de Dados</h2>
            <p>Status: Online</p>
        </section>

        <section class="card">
            <h2>API</h2>
            <p>Status: Offline</p>
        </section>

        <!-- 🔥 NOVA SEÇÃO DO GRÁFICO -->
        <section class="card">
            <h2>Gráfico de Falhas</h2>
            <canvas id="grafico"></canvas>
        </section>

    </main>

    <button onclick="simularFalha()">⚠️ Simular Falha</button>

    <p id="status">Status: OK</p>

    <button id="toggleDark">🌙 Dark Mode</button>

   
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>

</body>
</html>
